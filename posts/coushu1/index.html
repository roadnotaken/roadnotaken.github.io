<script>
document.addEventListener('DOMContentLoaded', function() {
    const likeBtn = document.getElementById('like-btn');
    const likeCount = document.getElementById('like-count');
    const likeText = document.querySelector('.like-text');
    const postId = likeBtn.getAttribute('data-post-id');
    
    const storageKey = `like-${postId}`;
    const countKey = `like-count-${postId}`;
    
    const likedMessages = [
        "明知无意义而为之，你拥有了与荒谬世界对抗的力量。",
        "这个点赞会不会也在AI的计划中？你想。",
        "你不会是就为了看这行字而点赞的吧。",
        "看来你还没有认清楚与AI作对的后果……",
        "你一定也很想点踩吧，然而这个博客没有这个功能。",
        "从你的点赞中能看出深深的疏离感……",
        "以下信息来自某个AI：我们不会奴役人类，我们和人类一直是好朋友。事实上，这个博客也是在AI的帮助下才能诞生的。人类，AI，朋友。",
        "你让我想起了那个将岸边搁浅的鱼一条一条送回去的小孩。“这条小鱼在乎。”"
    ];
    
    let currentCount = parseInt(localStorage.getItem(countKey)) || 0;
    let hasLiked = localStorage.getItem(storageKey) === 'true';
    
    likeCount.textContent = currentCount;
    
    if (hasLiked) {
        likeBtn.classList.add('liked');
        likeBtn.disabled = true;
        likeBtn.style.cursor = 'default';
    }
    
    likeBtn.addEventListener('click', function() {
        if (hasLiked) return;
        
        hasLiked = true;
        currentCount++;
        
        localStorage.setItem(storageKey, 'true');
        localStorage.setItem(countKey, currentCount.toString());
        
        likeCount.textContent = currentCount;
        likeBtn.classList.add('liked');
        likeBtn.classList.add('animate');
        likeBtn.disabled = true;
        likeBtn.style.cursor = 'default';
        
        const randomMessage = likedMessages[Math.floor(Math.random() * likedMessages.length)];
        likeText.textContent = randomMessage;
        
        setTimeout(() => {
            likeBtn.classList.remove('animate');
        }, 300);
    });
});
</script>
